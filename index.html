<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GXO Warehouse Shift Briefing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header Section -->
    <header class="header">
        <div class="logo-container">
            <span class="logo-text">GXO</span>
            <span class="logo-subtext">Logistics</span>
        </div>
        <div class="title-container">
            <h1>Daily Shift Briefing</h1>
            <p id="current-date">Loading date...</p>
        </div>
    </header>

    <!-- Main Dashboard Metrics -->
    <main class="dashboard-container">
        
        <!-- Targets Card -->
        <section class="card target-card">
            <h2>🎯 Shift Performance Targets</h2>
            <div class="metrics-grid">
                <div class="metric-box">
                    <span class="label">Picking Target</span>
                    <span class="value" id="display-pick-target">--</span>
                    <span class="unit">units/hr</span>
                </div>
                <div class="metric-box">
                    <span class="label">Packing Target</span>
                    <span class="value" id="display-pack-target">--</span>
                    <span class="unit">units/hr</span>
                </div>
            </div>
        </section>

        <!-- Announcements Card -->
        <section class="card announcements-card">
            <h2>📢 Important Announcements</h2>
            <div class="announcement-content">
                <p id="display-announcement">Loading latest updates...</p>
            </div>
        </section>

        <!-- Overtime Slots Card -->
        <section class="card overtime-card">
            <h2>⏱️ Available Overtime Slots</h2>
            <ul class="ot-list" id="display-ot-slots">
                <!-- Slots will inject here dynamically -->
            </ul>
        </section>

    </main>

    <!-- Manager Control Panel Section -->
    <footer class="manager-footer">
        <hr class="divider">
        
        <!-- Auth View -->
        <div id="manager-auth-section" class="auth-box">
            <h3>🔒 Manager Administrative Access</h3>
            <div class="input-group">
                <input type="password" id="manager-pin" placeholder="Enter Manager PIN">
                <button id="btn-unlock" class="btn btn-primary">Unlock Panel</button>
            </div>
        </div>

        <!-- Control View (Hidden by default) -->
        <div id="manager-panel-section" class="panel-box hidden">
            <h3>🛠️ Edit Dashboard Content</h3>
            
            <div class="form-grid">
                <div class="form-group">
                    <label for="input-pick-target">Picking Target:</label>
                    <input type="number" id="input-pick-target">
                </div>
                <div class="form-group">
                    <label for="input-pack-target">Packing Target:</label>
                    <input type="number" id="input-pack-target">
                </div>
            </div>

            <div class="form-group">
                <label for="input-announcement">Broadcast Announcement:</label>
                <textarea id="input-announcement" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label for="input-ot-slots">Overtime Slots (Comma separated, e.g., 06:00-14:00, 14:00-22:00):</label>
                <input type="text" id="input-ot-slots">
            </div>

            <div class="panel-actions">
                <button id="btn-publish" class="btn btn-success">Publish Live Update to Screen</button>
                <button id="btn-lock" class="btn btn-secondary">Lock Panel</button>
            </div>
        </div>
    </footer>

    <!-- Application Script Connection -->
    <script src="app.js"></script>
</body>
</html>
